<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="体脂率分享报告页面，展示 BMI 与 FFMI 九宫格身体类型结果，并提供体脂率测试入口。">
  <title>【SJQ】身体数据实验室 | 体脂分享报告</title>
  <link rel="canonical" href="https://sjqlab.top/pages/body-fat-share.html">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
      min-height: 100vh;
      background: #071015;
      color: #eaf6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(0,191,255,0.18), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(0,255,136,0.14), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(124,92,255,0.12), transparent 38%);
      z-index: -1;
    }
    .share-card {
      width: min(100%, 460px);
      border: 1px solid rgba(0,191,255,0.18);
      border-radius: 22px;
      background: rgba(255,255,255,0.045);
      box-shadow: 0 24px 80px rgba(0,0,0,0.42);
      padding: 24px;
      backdrop-filter: blur(18px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .brand-mark {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 36px;
      border-radius: 10px;
      background: #15d8d2;
      color: #051015;
      font-size: 15px;
      font-weight: 950;
      font-family: Arial, Helvetica, sans-serif;
    }
    .brand-mark::after {
      content: '';
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 10px;
      height: 5px;
      border-right: 3px solid #2168ff;
      border-bottom: 3px solid #2168ff;
      border-radius: 0 0 8px 0;
      transform: rotate(20deg);
    }
    .brand-text strong {
      display: block;
      color: #fff;
      font-size: 16px;
      white-space: nowrap;
    }
    .brand-text span {
      color: #7d94a3;
      font-size: 12px;
    }
    .eyebrow {
      color: #00ff88;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .type {
      display: block;
      font-size: 44px;
      line-height: 1.12;
      margin: 12px 0 20px;
      background: linear-gradient(135deg, #00ff88, #00bfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .metric {
      padding: 12px 8px;
      border-radius: 12px;
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.07);
      text-align: center;
    }
    .metric span {
      display: block;
      color: #8ca0aa;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .metric strong {
      color: #00ff88;
      font-size: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 52px repeat(3, 1fr);
      gap: 6px;
      margin: 18px 0 20px;
    }
    .cell,
    .axis {
      min-height: 54px;
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.07);
      color: #9fb0b8;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
    }
    .axis {
      color: #00bfff;
      background: rgba(0,191,255,0.06);
    }
    .cell.active {
      color: #fff;
      border-color: rgba(0,255,136,0.62);
      background: linear-gradient(135deg, rgba(0,255,136,0.26), rgba(0,191,255,0.16));
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      min-height: 46px;
      border-radius: 10px;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00ff88, #00bfff);
      color: #061010;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #dff6ff;
      border: 1px solid rgba(255,255,255,0.10);
    }
    .note {
      color: #7d94a3;
      font-size: 12px;
      line-height: 1.7;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main class="share-card">
    <div class="brand">
      <div class="brand-mark">SJQ</div>
      <div class="brand-text">
        <strong>身体数据实验室</strong>
        <span>体脂率测试分享报告</span>
      </div>
    </div>
    <div class="eyebrow">BMI × FFMI 九宫格定位</div>
    <h1>我的身体类型是 <span class="type" id="typeName">--</span></h1>
    <div class="metrics">
      <div class="metric"><span>体脂率</span><strong id="bf">--</strong></div>
      <div class="metric"><span>BMI</span><strong id="bmi">--</strong></div>
      <div class="metric"><span>FFMI</span><strong id="ffmi">--</strong></div>
    </div>
    <div class="grid" id="typeGrid"></div>
    <div class="actions">
      <a class="btn btn-primary" href="body-fat-calculator.html">我也测试</a>
      <button class="btn btn-secondary" type="button" onclick="shareThis()">分享给朋友</button>
    </div>
    <p class="note">结果仅用于身体数据参考，不构成医学诊断。完整解读可在测试后生成报告。</p>
  </main>
  <script>
    var params = new URLSearchParams(location.search);
    var type = params.get('type') || '身体类型';
    var key = params.get('key') || 'mid-mid';
    document.getElementById('typeName').textContent = type;
    document.getElementById('bf').textContent = (params.get('bf') || '--') + (params.get('bf') ? '%' : '');
    document.getElementById('bmi').textContent = params.get('bmi') || '--';
    document.getElementById('ffmi').textContent = params.get('ffmi') || '--';

    var rows = [
      ['高FFMI', '轻量肌肉型', '精壮型', '强壮肌肉型', ['high-low', 'high-mid', 'high-high']],
      ['中FFMI', '清瘦型', '标准均衡型', '厚实体型', ['mid-low', 'mid-mid', 'mid-high']],
      ['低FFMI', '瘦弱型', '隐性偏脂型', '虚胖型', ['low-low', 'low-mid', 'low-high']]
    ];
    var html = '<div class="axis">FFMI / BMI</div><div class="axis">偏瘦</div><div class="axis">正常</div><div class="axis">偏高</div>';
    rows.forEach(function(row) {
      html += '<div class="axis">' + row[0] + '</div>';
      for (var i = 0; i < 3; i++) {
        html += '<div class="cell ' + (row[4][i] === key ? 'active' : '') + '">' + row[i + 1] + '</div>';
      }
    });
    document.getElementById('typeGrid').innerHTML = html;

    async function shareThis() {
      if (navigator.share) {
        await navigator.share({
          title: '我的身体类型：' + type,
          text: '我在【SJQ】身体数据实验室测出了身体类型，来测测你的。',
          url: location.href
        });
      } else {
        await navigator.clipboard.writeText(location.href);
        alert('链接已复制');
      }
    }
  </script>
</body>
</html>
