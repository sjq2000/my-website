    body {

      background-color: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0, 191, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 100, 255, 0.06) 0%, transparent 50%);
      z-index: -1;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 191, 255, 0.15);
      z-index: 1000;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-brand {
      font-size: 20px;
      font-weight: 700;
      color: #00bfff;
      text-decoration: none;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #00bfff;
      transition: width 0.3s;
    }

    .nav-links a:hover { color: #00bfff; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: #00bfff; }
    .nav-links a.active::after { width: 100%; }

    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; }
    .nav-dropdown > a::after { content: ' \25BE'; font-size: 10px; }
    .nav-dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,191,255,0.15);
      border-radius: 10px;
      padding: 8px 0;
      min-width: 190px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .nav-dropdown:hover .nav-dropdown-menu { display: block; }
    .nav-dropdown-menu a {
      display: block;
      padding: 10px 20px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-dropdown-menu a::after { display: none !important; }
    .nav-dropdown-menu a:hover { color: #00bfff; background: rgba(0,191,255,0.08); }

    .menu-toggle {

      cursor: pointer;
    }

    .page-container {

      align-items: center;
      gap: 6px;
      color: #888;
      text-decoration: none;

    .article-grid {

    .article-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
      padding: 26px;
      border-radius: 12px;
      border: 1px solid rgba(0, 191, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: inherit;
      text-decoration: none;
      transition: all 0.3s;
    }

    .article-card:hover {
      background: rgba(0, 191, 255, 0.05);
      border-color: rgba(0, 191, 255, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 10px 34px rgba(0, 191, 255, 0.1);

    .article-source {

      margin-bottom: 14px;

    .article-card h2 {

    .article-action {

      color: #00bfff;
      font-size: 14px;
      font-weight: 700;
      margin-top: 24px;
    }

    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
      text-align: center;
      color: #555;
      font-size: 14px;
    }

    .visit-counter {
      margin-top: 8px;
      color: #444;
      font-size: 12px;
    }

    .visit-counter span { color: #555; }

    @media (max-width: 760px) {
      .article-grid { grid-template-columns: 1fr; }
      .page-container { padding: 90px 18px 50px; }
      .article-card { min-height: 0; padding: 22px; }
    }

    @media (max-width: 600px) {

      nav { padding: 0 20px; }
      .nav-links {
        display: none;
        position: absolute;
        top: 64px;
        left: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 20px;
        gap: 16px;
        border-bottom: 1px solid rgba(0, 191, 255, 0.15);
      }
      .nav-links.open { display: flex; }
      .nav-dropdown-menu {
        position: static;
        transform: none;
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0 0 0 16px;
        display: block !important;
      }
      .nav-dropdown-menu a { padding: 8px 0; }
    }
  

    .nav-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #eaf6ff !important;
      text-decoration: none;
      letter-spacing: 0;
      font-weight: 900;
      white-space: nowrap;
    }

    .brand-mark {

      font-weight: 950;
      letter-spacing: 0;
      box-shadow: 0 8px 22px rgba(0, 191, 255, 0.18);

    .brand-mark::after {
      content: '';
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 10px;
      height: 5px;
