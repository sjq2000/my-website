  <script>
    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"']/g, function(ch) {
        return ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'})[ch];
      });
    }

    function makeList(items) {
      if (!items || !items.length) return '<p>暂无可用数据。</p>';
      return '<div class="generated-list">' + items.map(function(item) {
        return '<div>' + escapeHtml(item) + '</div>';
      }).join('') + '</div>';
    }

    function hasScore(value) {
      return value != null && isFinite(Number(value));
    }

    function cleanScore(value) {
      if (!hasScore(value)) return null;
      return Math.max(0, Math.min(100, Number(value)));
    }

    function radarPoint(score, index, total, radius, center) {
      var angle = -Math.PI / 2 + index * 2 * Math.PI / total;
      var r = radius * (hasScore(score) ? cleanScore(score) : 0) / 100;
      return {
        x: center + Math.cos(angle) * r,
        y: center + Math.sin(angle) * r,
        lx: center + Math.cos(angle) * (radius + 22),
        ly: center + Math.sin(angle) * (radius + 22)
      };
    }

    function renderFitnessRadar(profile) {
      var labels = ['体格', '心肺', '爆发力', '力量', '耐力'];
      var rawValues = [
        profile.physique,
        profile.cardio,
        profile.explosive,
        profile.strength,
        profile.endurance
      ];
      var values = rawValues.map(cleanScore);
      var chartValues = values.map(function(value) { return value == null ? 0 : value; });
      var center = 150;
      var radius = 96;
      var levels = [20, 40, 60, 80, 100].map(function(level) {
        return labels.map(function(_, i) {
          var point = radarPoint(level, i, labels.length, radius, center);
          return point.x.toFixed(1) + ',' + point.y.toFixed(1);
        }).join(' ');
      });
      var points = chartValues.map(function(value, i) {
        var point = radarPoint(value, i, chartValues.length, radius, center);
        return point.x.toFixed(1) + ',' + point.y.toFixed(1);

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
      var chars = String(text).split('');
      var line = '';
      for (var i = 0; i < chars.length; i++) {
        var test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = chars[i];
          y += lineHeight;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, x, y);
      return y;
    }

    function normalPdf(x) {
      return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);

    function renderTestosteroneDistribution(mean, val) {
      var sd = 147;
      var width = 680;
      var height = 260;
      var pad = 42;
      var left = mean - 4 * sd;
      var right = mean + 4 * sd;
      var topPdf = normalPdf(0);
      function xScale(v) {
        return pad + (v - left) / (right - left) * (width - pad * 2);
      }
      function yScale(pdf) {
        return height - pad - (pdf / topPdf) * (height - pad * 2);
      }
      var curve = [];
      for (var i = 0; i <= 160; i++) {
        var current = left + (right - left) * i / 160;
        var z = (current - mean) / sd;
        curve.push([xScale(current), yScale(normalPdf(z))]);
      }
      var linePath = curve.map(function(point, i) {
        return (i ? 'L' : 'M') + point[0].toFixed(1) + ' ' + point[1].toFixed(1);
      }).join(' ');
      var areaPath = linePath + ' L ' + xScale(right).toFixed(1) + ' ' + (height - pad).toFixed(1) + ' L ' + xScale(left).toFixed(1) + ' ' + (height - pad).toFixed(1) + ' Z';
      var userX = Math.max(pad, Math.min(width - pad, xScale(val)));
      var userZ = (val - mean) / sd;
      var userY = yScale(normalPdf(userZ));
      var meanX = xScale(mean);
      var ticks = [-2, -1, 0, 1, 2].map(function(z) {
        var tickValue = mean + z * sd;
        var x = xScale(tickValue);
        return '<line class="distribution-grid" x1="' + x.toFixed(1) + '" y1="' + pad + '" x2="' + x.toFixed(1) + '" y2="' + (height - pad) + '"></line>' +
          '<text class="distribution-label" x="' + x.toFixed(1) + '" y="' + (height - 14) + '">' + Math.round(tickValue) + '</text>';
      }).join('');
      return '<svg class="distribution-chart" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="睾酮同龄正态分布曲线">' +
        '<line class="distribution-grid" x1="' + pad + '" y1="' + (height - pad) + '" x2="' + (width - pad) + '" y2="' + (height - pad) + '"></line>' +
        ticks +
        '<path class="distribution-area" d="' + areaPath + '"></path>' +
        '<path class="distribution-curve" d="' + linePath + '"></path>' +
        '<line class="distribution-mean" x1="' + meanX.toFixed(1) + '" y1="' + pad + '" x2="' + meanX.toFixed(1) + '" y2="' + (height - pad) + '"></line>' +
        '<line class="distribution-user-line" x1="' + userX.toFixed(1) + '" y1="' + userY.toFixed(1) + '" x2="' + userX.toFixed(1) + '" y2="' + (height - pad) + '"></line>' +
        '<circle class="distribution-user-dot" cx="' + userX.toFixed(1) + '" cy="' + userY.toFixed(1) + '" r="6"></circle>' +
        '<text class="distribution-callout" x="' + userX.toFixed(1) + '" y="' + Math.max(20, userY - 14).toFixed(1) + '">你：' + val.toFixed(0) + '</text>' +
        '<text class="distribution-label" x="' + meanX.toFixed(1) + '" y="' + (pad - 12) + '">同龄均值</text>' +
        '</svg>';
    }

      var html = '';
      html += '<div class="report-section"><h3>1. 核心结果</h3><div class="metric-pills">' +
        '<div class="metric-pill"><span>同龄百分位</span><strong>' + percentile.toFixed(1) + '%</strong></div>' +
        '<div class="metric-pill"><span>等级</span><strong>' + escapeHtml(grade) + '</strong></div>' +
        '<div class="metric-pill"><span>睾酮</span><strong>' + ngdl.toFixed(0) + '</strong></div>' +
        '<div class="metric-pill"><span>Z-Score</span><strong>' + z.toFixed(2) + '</strong></div>' +
        '</div><p>' + escapeHtml(profile.summary) + '</p></div>';
      html += '<div class="report-section"><h3>2. 同龄分布</h3>' + renderTestosteroneDistribution(mean, ngdl) + '<p>曲线表示同龄男性睾酮水平的估算分布，绿色虚线为同龄均值，红点为你的检测位置。</p></div>';
      html += '<div class="report-section"><h3>3. 数值换算</h3>' + makeList([
        'ng/dL：' + ngdl.toFixed(1),
        'nmol/L：' + nmol.toFixed(2),
        'ng/mL：' + ngml.toFixed(2),
        '同龄均值：' + mean.toFixed(0) + ' ng/dL'
      ]) + '</div>';
      html += '<div class="report-section"><h3>4. 结果解读</h3><p><strong>' + escapeHtml(profile.title) + '</strong>。' + escapeHtml(profile.status) + '</p></div>';
      html += '<div class="report-section"><h3>5. 建议</h3><p>' + escapeHtml(profile.advice) + '</p></div>';
      html += '<div class="report-section"><h3>6. 改善建议</h3><p>' + escapeHtml(profile.improve) + '</p></div>';
      html += '<div class="report-section"><h3>7. 复查方式</h3><p>睾酮波动较大，建议复查时尽量固定条件：上午抽血、前一晚睡眠充足、避免前一天高强度训练和大量饮酒。需要医学判断时，应结合游离睾酮、SHBG、LH、FSH、雌二醇、催乳素、血常规等指标。</p></div>';
      return html;
    }

    function renderFitnessSpecificReport(data) {
      var html = '';
      html += '<div class="report-section"><h3>1. 五维能力图</h3>' + renderFitnessRadar(data.fitnessProfile || {}) + '</div>';
      html += '<div class="report-section"><h3>2. 维度定义</h3><p>五维能力值均由对应项目百分位换算为0-100分，用来观察体测结构是否均衡。</p></div>';
      html += '<div class="report-section"><h3>3. 输入数据</h3>' + makeList(data.inputs) + '</div>';
      html += '<div class="report-section"><h3>4. 核心结果</h3>' + makeList(data.rows || []) + '</div>';
      var p = data.fitnessProfile || {};
      var scores = [
        ['体格', cleanScore(p.physique), '身高和体重形成的基础身体条件'],
        ['心肺', cleanScore(p.cardio), '肺活量代表的呼吸循环基础'],
        ['爆发力', cleanScore(p.explosive), '短跑速度和跳跃能力的综合'],
        ['力量', cleanScore(p.strength), '握力代表的基础力量水平'],
        ['耐力', cleanScore(p.endurance), '1000米跑代表的持续输出能力']
      ].filter(function(item) { return item[1] != null; }).sort(function(a, b) { return b[1] - a[1]; });
      if (!scores.length) {
        html += '<div class="report-section"><h3>5. 结果解读</h3><p>当前没有可用于分析的体测项目。请至少填写一个项目后重新生成报告。</p></div>';
        html += '<div class="report-section"><h3>6. 训练建议</h3><p>建议先补充最关心的项目数据，再根据实际短板安排训练。</p></div>';
        return html;
      }
      var strongest = scores[0];
      var weakest = scores[scores.length - 1];
      var spread = strongest[1] - weakest[1];
      var balanceText = scores.length < 2 ? '当前只填写了一个维度，暂不判断短板。' : (spread < 15 ? '已填写维度整体比较均衡，没有特别明显的短板。' : spread < 30 ? '已填写维度存在一定差异，优势和短板已经比较清楚。' : '已填写维度分化明显，短板维度会显著限制综合体测表现。');
      if (scores.length < 2) {
        html += '<div class="report-section"><h3>5. 结果解读</h3><p>当前已填写的维度是 <strong>' + strongest[0] + '</strong>（' + strongest[1].toFixed(1) + '分），主要体现为' + strongest[2] + '。' + balanceText + '</p></div>';
      } else {
        html += '<div class="report-section"><h3>5. 结果解读</h3><p>你的最强维度是 <strong>' + strongest[0] + '</strong>（' + strongest[1].toFixed(1) + '分），主要体现为' + strongest[2] + '；相对短板是 <strong>' + weakest[0] + '</strong>（' + weakest[1].toFixed(1) + '分），对应' + weakest[2] + '。' + balanceText + ' 体测成绩的提升通常不是把所有项目平均用力，而是先找到已填写项目中限制总表现的关键短板，再判断它是否具备较高的短期可训练性。</p><p>如果你的优势维度已经明显高于其他维度，继续强化优势当然能维持特色，但对综合表现的边际收益可能下降。相反，低分维度往往更容易通过一段集中训练获得明显提升，尤其是爆发力、耐力和力量这类训练反应较快的项目。</p></div>';
      }
      var advice = scores.length < 2 ? '当前数据较少，建议先补充更多体测项目，再做完整训练优先级排序。' : '建议把训练优先级分为三层：第一层处理最低维度，第二层维持最高维度，第三层补足与考试直接相关的专项技术。';
      if (scores.length >= 2 && weakest[0] === '爆发力') {
        advice += ' 你的爆发力相对不足，建议优先安排短跑加速、立定跳远技术、下肢最大力量和弹跳训练。每周可以安排2次高质量爆发训练，重点保证动作速度和充分休息。';
      } else if (scores.length >= 2 && weakest[0] === '耐力') {
        advice += ' 你的耐力相对不足，建议用间歇跑和低强度有氧建立基础。1000米提升不要只靠硬跑，可以采用400米间歇、节奏跑和轻松跑组合，逐步提高配速稳定性。';
      } else if (scores.length >= 2 && weakest[0] === '心肺') {
        advice += ' 你的心肺维度相对不足，肺活量提升需要长期训练和呼吸效率改善。建议结合有氧训练、游泳、间歇跑和呼吸控制练习，同时注意体重和睡眠。';
      } else if (scores.length >= 2 && weakest[0] === '力量') {
        advice += ' 你的力量相对不足，建议补充握力、背部、前臂和全身基础力量训练。握力不是孤立问题，硬拉、引体、农夫走和悬垂都能间接提高。';
      } else if (scores.length >= 2) {
        advice += ' 你的体格维度相对不足，短期内身高难以改变，体重和身体成分更值得关注。建议结合力量训练和营养管理，提高有效体重和去脂体重。';
      }
      advice += ' 建议以4-8周为一个小周期，训练前后重新输入数据，观察雷达图是否更均衡。如果某个维度长期没有变化，再考虑调整训练方法或做更完整的私人分析。';
      html += '<div class="report-section"><h3>6. 训练建议</h3><p>' + advice + '</p></div>';
      return html;
    }

    function formatMaybeNumber(value, digits, suffix) {
      if (value == null || value === '' || !isFinite(Number(value))) return '--';
      return Number(value).toFixed(digits == null ? 1 : digits) + (suffix || '');
    }

    function renderMuscleSpecificReport(data) {
      var progress = Math.max(0, Math.min(100, Number(data.potentialPercent || 0)));
      var metrics = [
        ['当前去脂体重', formatMaybeNumber(data.currentLbm, 1, ' kg')],
        ['可增加去脂体重', formatMaybeNumber(data.gainLeft, 1, ' kg')],
        ['当前 FFMI', formatMaybeNumber(data.ffmi, 1)],
        ['骨架评分', escapeHtml(data.frameText || '--')]
      ].map(function(item) {
        return '<div class="metric-pill"><span>' + item[0] + '</span><strong>' + item[1] + '</strong></div>';
      }).join('');

      var rows = [
        ['总体重（kg）', data.realisticBodyKg, data.maxBodyKg],
        ['去脂体重（kg）', data.realisticLbm, data.maxLbm],
        ['脂肪量（kg）', data.realisticFatKg, data.maxFatKg],
        ['胸围（cm）', data.chestRealistic, data.chestMax],
        ['上臂围（cm）', data.bicepsRealistic, data.bicepsMax],
        ['前臂围（cm）', data.forearmsRealistic, data.forearmsMax],
        ['颈围（cm）', data.neckRealistic, data.neckMax],
        ['大腿围（cm）', data.thighsRealistic, data.thighsMax],
        ['小腿围（cm）', data.calvesRealistic, data.calvesMax]
      ].map(function(row) {
        return '<tr><td>' + row[0] + '</td><td>' + formatMaybeNumber(row[1], 1) + '</td><td>' + formatMaybeNumber(row[2], 1) + '</td></tr>';
      }).join('');

      var html = '';
      html += '<div class="report-section"><h3>1. 核心指标</h3><div class="metric-pills">' + metrics + '</div></div>';
      html += '<div class="report-section"><h3>2. 潜力进度</h3><div class="report-progress"><div class="report-progress-head"><span>增肌潜力开发进度</span><span class="report-progress-value">' + progress + '%</span></div><div class="report-progress-track"><div class="report-progress-fill" style="width:' + progress + '%"></div></div><p style="margin-top:10px;">按基础 FFMI 18.5 估算起点：已开发 <strong>' + formatMaybeNumber(data.developedLbmKg, 1, ' kg') + '</strong> / 可开发 <strong>' + formatMaybeNumber(data.trainableLbmKg, 1, ' kg') + '</strong>。</p></div></div>';
      html += '<div class="report-section"><h3>3. 自然状态预测表</h3><table class="report-table"><thead><tr><th>指标</th><th>合理自然状态</th><th>最大自然状态</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
      html += '<div class="report-section"><h3>4. 结果解读</h3><p>当前去脂体重约 <strong>' + formatMaybeNumber(data.currentLbm, 1, ' kg') + '</strong>，距离合理自然状态还差约 <strong>' + formatMaybeNumber(data.gainLeft, 1, ' kg') + '</strong> 去脂体重。当前体脂率约 <strong>' + formatMaybeNumber(data.bodyFatPercent, 1, '%') + '</strong>，训练阶段为 <strong>' + escapeHtml(data.stageText || '--') + '</strong>。</p></div>';
      html += '<div class="report-section"><h3>5. 训练建议</h3><p>' + escapeHtml(data.muscleAdvice || inferAdvice(data)) + '</p></div>';
      return html;
    }

    function inferAdvice(data) {
      var title = data.title || '';
      if (title.indexOf('增肌') !== -1) return '重点关注去脂体重、体脂率和潜力开发进度。如果剩余空间较大，优先优化热量盈余、蛋白质摄入、复合动作训练容量和睡眠恢复。';
      if (title.indexOf('睾酮') !== -1) return '重点关注百分位、年龄和检测单位。单次睾酮结果容易受睡眠、压力、饮食和检测时间影响。';
      if (title.indexOf('身高') !== -1) return '重点关注测量年龄、同龄平均差值和预测成年身高。预测值不是确定结果，需要结合发育节奏、父母身高、营养和睡眠判断。';
      if (title.indexOf('体脂') !== -1) return '重点关注体脂率、去脂体重和 FFMI。建议结合体重趋势、腰围变化和训练表现一起判断。';
      if (title.indexOf('生理') !== -1) return '重点关注生理年龄和实际年龄差值。这个结果适合做健康趋势参考，不适合单独诊断。';
      return '建议结合结果中的优势项和短板项，优先处理最能改变结论的指标，并在4-8周后重新计算对比。';
    }

    function buildGeneratedReportHtml(data) {
      var html = '';
      html += '<div class="report-section"><h3>1. 报告对象</h3><p>本报告基于 <strong>' + escapeHtml(data.title || '当前计算器') + '</strong> 的输入和计算结果生成，适合快速理解数据含义和下一步方向。</p></div>';
      html += '<div class="report-section"><h3>2. 输入数据</h3>' + makeList(data.inputs) + '</div>';
      html += '<div class="report-section"><h3>3. 核心结果</h3>' + makeList((data.summaries || []).concat(data.rows || []).concat(data.looseResults || [])) + '</div>';
      if (data.interpretation) html += '<div class="report-section"><h3>4. 页面原始解读</h3><p>' + escapeHtml(data.interpretation) + '</p></div>';
      html += '<div class="report-section"><h3>5. 进一步解读</h3><p>' + escapeHtml(inferAdvice(data)) + '</p></div>';
      html += '<div class="report-section"><h3>6. 下一步建议</h3><p>建议保存本次结果，后续在训练、饮食、睡眠或健康管理调整4-8周后再次计算对比。</p></div>';
      return html;
    }

    function renderLockedReport(data) {
      return '<div class="report-section"><h3>报告已生成，支付后查看</h3><p>已检测到 <strong>' + escapeHtml(data.title || '当前计算器') + '</strong> 的计算结果。请先扫码支付，支付完成后点击上方按钮确认查看。</p><div class="locked-preview">可预览：本报告将包含输入数据、核心结果、能力图表、结果解读和训练建议。</div></div>';
    }

    function getReportUnlockKey(data) {
      var source = JSON.stringify({
        reportType: data && data.reportType,
        title: data && data.title,
        createdAt: data && data.createdAt,
        inputs: data && data.inputs,
        rows: data && data.rows,
        summaries: data && data.summaries,
        bodyFatPercent: data && data.bodyFatPercent,
        bmi: data && data.bmi,
        ffmi: data && data.ffmi,
        percentile: data && data.percentile,
        testosteroneNgdl: data && data.testosteroneNgdl
      });
      var hash = 0;
      for (var i = 0; i < source.length; i++) {
        hash = ((hash << 5) - hash) + source.charCodeAt(i);
        hash |= 0;
      }
      return 'report-' + Math.abs(hash);
    }

    function confirmPayment() {
      if (confirm('是否确定已完成支付？')) {
        var raw = localStorage.getItem('paidReportData');
        if (!raw) {
          alert('还没有检测到报告数据，请先回到计算器完成计算。');
          return;
        }
        var data;
        try { data = JSON.parse(raw); } catch (e) {
          alert('报告数据读取失败，请回到计算器重新计算一次。');
          return;
        }
        localStorage.removeItem('paidReportUnlocked');
        localStorage.setItem('paidReportUnlockedKey', getReportUnlockKey(data));
        renderGeneratedReport();
        var report = document.getElementById('generatedReport');
        if (report) report.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderGeneratedReport() {
      var box = document.getElementById('generatedReport');
      var time = document.getElementById('generatedTime');
      if (!box) return;
      var raw = localStorage.getItem('paidReportData');
      if (!raw) {
        var emptyPayStrip = document.getElementById('payStrip');
        if (emptyPayStrip) emptyPayStrip.style.display = '';
        box.innerHTML = '<div class="report-section"><h3>还没有报告数据</h3><p>请先回到体脂率计算器填写身高、体重、腰围并点击计算，再购买完整报告。</p><div class="generated-list"><div><a href="body-fat-calculator.html" style="color:#00bfff;text-decoration:none;font-weight:800;">去体脂率计算器测试 &rarr;</a></div></div></div>';
        if (time) time.textContent = '等待计算结果';
        return;
      }

      var data;
      try { data = JSON.parse(raw); } catch (e) {
        box.innerHTML = '<div class="report-section"><h3>报告数据读取失败</h3><p>请回到计算器重新计算一次。</p></div>';
        return;
      }

      if (data.reportType === 'bodyFat' && (!Number(data.bmi) || !Number(data.ffmi) || !Number(data.bodyFatPercent))) {
        box.innerHTML = '<div class="report-section"><h3>体脂报告数据不完整</h3><p>请回到体脂率计算器重新填写并计算，再查看报告。</p><div class="generated-list"><div><a href="body-fat-calculator.html" style="color:#00bfff;text-decoration:none;font-weight:800;">重新计算体脂率 &rarr;</a></div></div></div>';
        if (time) time.textContent = '等待计算结果';
        return;
      }

      if (data.reportType === 'testosterone' && (!Number(data.percentile) || !Number(data.testosteroneNgdl))) {
        box.innerHTML = '<div class="report-section"><h3>睾酮报告数据不完整</h3><p>请回到睾酮评估重新填写并计算，再查看报告。</p><div class="generated-list"><div><a href="testosterone.html" style="color:#00bfff;text-decoration:none;font-weight:800;">重新评估睾酮 &rarr;</a></div></div></div>';
        if (time) time.textContent = '等待计算结果';
        return;
      }

      time.textContent = data.createdAt || '刚刚生成';
      var priceEl = document.getElementById('reportPrice');
      if (priceEl) priceEl.textContent = data.price || '¥9.9';
      var payStrip = document.getElementById('payStrip');
      var unlockedKey = localStorage.getItem('paidReportUnlockedKey');
      var currentKey = getReportUnlockKey(data);
      if (unlockedKey !== currentKey) {
        if (payStrip) payStrip.style.display = '';
        localStorage.removeItem('paidReportUnlocked');
        box.innerHTML = renderLockedReport(data);
        return;
      }

      if (payStrip) payStrip.style.display = 'none';

      if (data.reportType === 'fitness') {
        box.innerHTML = renderFitnessSpecificReport(data);
      } else if (data.reportType === 'muscle') {
        box.innerHTML = renderMuscleSpecificReport(data);
      } else if (data.reportType === 'bodyFat') {
        box.innerHTML = renderBodyFatSpecificReport(data);
      } else if (data.reportType === 'testosterone') {
        box.innerHTML = renderTestosteroneSpecificReport(data);
      } else {
        box.innerHTML = buildGeneratedReportHtml(data);
      }
    }

    renderGeneratedReport();
  </script>
</body>
</html>
